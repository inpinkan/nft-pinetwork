/* =========================================================
   PNC v1.9.5 — NETWORK & TRANSACTION SAFETY
   ---------------------------------------------------------
   Purpose:
   - Keep Safe UI and Transaction UI strings on one t() lookup path.
   - Preserve the approved UI, wallet, storage, media and marketplace feature paths.
   - Migrate transaction prompts, confirmations, progress, success and failure messages through t().

   Active boundaries:
   - PNC_I18N / t() own safe and transaction interface labels.
   - User NFT / Shop metadata is never translated or rewritten.
   - Blockchain, Marketplace, Pinata, KV and transaction logic remains unchanged.
   ========================================================= */

/* =========================================================
   PNC v1.8.5 — THEME FOUNDATION & MOBILE MENU SCROLL
   Visual rules only. Marketplace / wallet logic is unchanged.
   ========================================================= */
:root{
  --pnc-space-1:4px;
  --pnc-space-2:8px;
  --pnc-space-3:12px;
  --pnc-space-4:16px;
  --pnc-space-5:24px;
  --pnc-radius-sm:12px;
  --pnc-radius-md:16px;
  --pnc-radius-lg:20px;
  --pnc-control-h:42px;
  --pnc-shadow-card:0 8px 24px rgba(0,0,0,.16);
  --pnc-shadow-float:0 12px 32px rgba(0,0,0,.28);
  --pnc-focus:0 0 0 3px rgba(245,176,65,.24);
  --pnc-transition:160ms ease;
}

/* Typography and rhythm */
body{line-height:1.45;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
main{padding-top:20px}
.section{margin:24px 0}
.section-title{line-height:1.2;letter-spacing:-.015em}
.name,.nft-name,.collection-name{line-height:1.28}
.meta{line-height:1.5}

/* Unified surfaces */
.panel,.card,.collection-list,.stat,.status-box,.creator-list-item,.draft-card,.note{
  box-shadow:var(--pnc-shadow-card);
}
.panel,.card,.collection-list{border-radius:var(--pnc-radius-lg)}
.card{overflow:hidden;transition:transform var(--pnc-transition),border-color var(--pnc-transition),box-shadow var(--pnc-transition)}
@media (hover:hover){
  .card:hover{transform:translateY(-2px);border-color:rgba(245,176,65,.46);box-shadow:0 12px 28px rgba(0,0,0,.23)}
}

/* Unified controls */
.wallet-btn,.primary-btn,.small-btn,.creator-tab,.ghost-btn,.sell-btn,.buy-btn,.delete-btn,
.refresh-btn,.menu-btn,.carousel-btn{
  min-height:var(--pnc-control-h);
  transition:transform var(--pnc-transition),filter var(--pnc-transition),background var(--pnc-transition),border-color var(--pnc-transition),box-shadow var(--pnc-transition);
}
.wallet-btn,.primary-btn,.small-btn{border-radius:var(--pnc-radius-sm)}
button:active{transform:translateY(1px)}
button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible,summary:focus-visible{
  outline:none;box-shadow:var(--pnc-focus)
}
@media (hover:hover){
  .wallet-btn:hover,.primary-btn:hover,.sell-btn:hover,.buy-btn:hover{filter:brightness(1.06)}
  .ghost-btn:hover,.small-btn:hover,.creator-tab:hover{border-color:rgba(245,176,65,.5)}
}

/* Forms */
.search-row input,.form input,.form textarea,.form select{
  min-height:var(--pnc-control-h);
  border:1px solid transparent;
  transition:border-color var(--pnc-transition),box-shadow var(--pnc-transition);
}
.search-row input:focus,.form input:focus,.form textarea:focus,.form select:focus{
  border-color:rgba(245,176,65,.75);
  box-shadow:var(--pnc-focus)
}
.form label{gap:7px}

/* Cards and media */
.nft-img,.collection-banner,.top-banner,.detail-image,.nft-media-card{overflow:hidden}
.body{padding:13px}
.badge-row{gap:6px;margin-top:8px}
.badge,.status-badge,.chain-badge{padding:4px 9px}
.price-block{margin:9px 0}

/* Modals, menus, toast-like floating layers */
.menu,.search-results{box-shadow:var(--pnc-shadow-float)}
.menu button{transition:background var(--pnc-transition),border-color var(--pnc-transition)}
@media (hover:hover){.menu button:hover{background:rgba(245,176,65,.12);border-color:rgba(245,176,65,.6)}}

/* Carousel controls stay visually consistent */
.carousel-btn{display:inline-flex;align-items:center;justify-content:center}
.carousel-btn:focus-visible{box-shadow:var(--pnc-focus)}

/* Preserve the approved compact footer; only refine alignment */
.site-footer{flex-shrink:0}
.footer-main{align-items:start}
.footer-column h3,.footer-accordion summary{line-height:1.25}
.footer-link{line-height:1.35}

  }

  *,*::before,*::after{scroll-behavior:auto!important;animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}

   PNC v1.8.5 — COMPONENT POLISH + FEEDBACK MOTION
   NFT/Shop cards, modals, toast, loading and empty states.
   ========================================================= */
:root{

.detail-overlay,.wallet-modal,.legal-modal{

.detail-overlay.show .detail-box,.wallet-modal.show .wallet-box,.legal-modal.show .legal-box{

@keyframes pncOverlayIn{from{opacity:0}to{opacity:1}}
@keyframes pncModalIn{
  from{opacity:0;transform:translateY(14px) scale(.992)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.detail-overlay.closing,.wallet-modal.closing,.legal-modal.closing{
  animation:pncOverlayOut 145ms ease-in both;
  pointer-events:none;
}
.detail-overlay.closing .detail-box,.wallet-modal.closing .wallet-box,.legal-modal.closing .legal-box{
  animation:pncModalOut 145ms cubic-bezier(.4,0,1,1) both;
  transform-origin:center bottom;
}
@keyframes pncOverlayOut{from{opacity:1}to{opacity:0}}
@keyframes pncModalOut{
  from{opacity:1;transform:translateY(0) scale(1)}

}
.detail-box h2,.wallet-box h2,.legal-box h2{margin-top:0;line-height:1.25}
.close-btn{min-height:42px}

.pnc-toast-region{position:fixed;right:18px;bottom:18px;z-index:10000;display:grid;gap:10px;pointer-events:none}

.pnc-toast.success{border-color:rgba(84,208,143,.65)}
.pnc-toast.error{border-color:rgba(255,102,119,.7)}

body.light .form input,
body.light .form textarea,
body.light .form select,
body.light .search-row input{background:#fff;color:#17121c;border:1px solid var(--border)}
body.light .form input::placeholder,
body.light .form textarea::placeholder,
body.light .search-row input::placeholder{color:#8c8293}
body.light .delete-btn{background:#5e5565;color:#fff}
body.light .footer-accordion{border-bottom-color:rgba(91,45,130,.13)}
body.light .search-item:hover{background:rgba(245,176,65,.15)}

/* The purple header/menu intentionally remains brand-dark in both themes. */
body.light header{color:#fff}
body.light header .menu{background:rgba(255,255,255,.09)}
body.light header .menu button{color:#fff}
body.light header .menu .language-option span{color:#d9cde5}
body.light header .menu .language-option.is-active{background:rgba(84,208,143,.12)}

/* Scrollable menu: dynamic viewport, momentum scroll and safe-area room. */
.menu-inner{min-height:0}
.menu.show{overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;scrollbar-gutter:stable}
@supports (height:100dvh){
  .menu.show{max-height:calc(100dvh - 156px)}
}
@media (max-width:759px){
  .menu.show{
    max-height:calc(100vh - 150px);
    padding-bottom:calc(14px + env(safe-area-inset-bottom))!important;
    touch-action:pan-y;
  }
  @supports (height:100dvh){.menu.show{max-height:calc(100dvh - 150px)}}
  .menu-title{margin:8px 0 4px}
  .menu button{margin:5px 0;padding:9px 10px;min-height:42px}
  .language-list{gap:5px}
}
@media (max-width:390px), (max-height:700px){
  .menu.show{max-height:calc(100vh - 142px)}
  @supports (height:100dvh){.menu.show{max-height:calc(100dvh - 142px)}}
  .menu-title{margin:6px 0 3px;font-size:13px}
  .menu button{margin:4px 0;padding:8px 9px;min-height:38px;font-size:13px}
  .menu .language-option span{font-size:10px}
}

let PNC_CURRENT_LANGUAGE=PNC_DEFAULT_LANGUAGE;

function normalizeLanguageCode(language){
  const code=String(language||'').trim().toLowerCase().split('-')[0];
  return PNC_SUPPORTED_LANGUAGES.includes(code)?code:PNC_DEFAULT_LANGUAGE;
}
function readStoredLanguage(){
  try{
    const stored=normalizeLanguageCode(localStorage.getItem(PNC_LANGUAGE_STORAGE_KEY));
    return PNC_AVAILABLE_LANGUAGES.includes(stored)?stored:PNC_DEFAULT_LANGUAGE;
  }catch(e){return PNC_DEFAULT_LANGUAGE;}
}
function persistLanguage(language){
  try{localStorage.setItem(PNC_LANGUAGE_STORAGE_KEY,language);}
  catch(e){console.warn('Language preference could not be saved:',e);}
}
function getLanguage(){return PNC_CURRENT_LANGUAGE;}
function locale(language=getLanguage()){return PNC_LOCALES[normalizeLanguageCode(language)]||PNC_LOCALES[PNC_DEFAULT_LANGUAGE];}
function i18nValue(dictionary,key){
  return String(key||'').split('.').reduce((value,part)=>value&&Object.prototype.hasOwnProperty.call(value,part)?value[part]:undefined,dictionary);
}
function interpolateTranslation(value,params){
  return String(value).replace(/\{([a-zA-Z0-9_]+)\}/g,(match,name)=>Object.prototype.hasOwnProperty.call(params,name)?String(params[name]):match);
}
function t(key,params={},language=getLanguage()){
  const code=normalizeLanguageCode(language);
  const translated=i18nValue(PNC_I18N[code],key);
  const fallback=i18nValue(PNC_I18N[PNC_DEFAULT_LANGUAGE],key);
  const value=translated??fallback??key;
  return interpolateTranslation(value,params&&typeof params==='object'?params:{});
}
function setLanguage(language,options={}){
  const next=normalizeLanguageCode(language);
  PNC_CURRENT_LANGUAGE=next;
  document.documentElement.lang=next;
  if(options.persist!==false)persistLanguage(next);
  return next;
}
function initLanguageEngine(){return setLanguage(readStoredLanguage(),{persist:false});}
function applySafeUITranslations(){
  document.querySelectorAll('[data-i18n]').forEach(node=>{node.textContent=t(node.getAttribute('data-i18n'));});
  const search=$('searchInput');if(search)search.placeholder=t('header.searchPlaceholder');
  const refresh=$('platformRefreshBtn');if(refresh){refresh.title=t('header.refresh');refresh.setAttribute('aria-label',t('header.refresh'));}
  const menuButton=$('menuToggleBtn');if(menuButton)menuButton.setAttribute('aria-label',t('header.openMenu'));
  const languageList=document.querySelector('.language-list');if(languageList)languageList.setAttribute('aria-label',t('language.title'));
  renderLanguageMenuState();
  const carouselLabels={hotNfts:'home.hotNfts',liveAuctions:'home.liveAuctions',newNfts:'home.newNfts',newCollections:'home.newCollections',featuredCollections:'home.featuredCollections'};
  Object.entries(carouselLabels).forEach(([id,key])=>{const prev=document.querySelector(`[data-carousel-prev="${id}"]`),next=document.querySelector(`[data-carousel-next="${id}"]`),label=t(key);if(prev)prev.setAttribute('aria-label',label+' left');if(next)next.setAttribute('aria-label',label+' right');});
  const owned=$('vaultTabOwned'),send=$('vaultTabSend'),receive=$('vaultTabReceive');if(owned)owned.textContent=t('vault.ownedNfts');if(send)send.textContent=t('vault.send');if(receive)receive.textContent=t('vault.receive');
}

function rerenderLanguageUI(){
  applySafeUITranslations();
  renderAll(PNC_STATE);
  const detailOverlay=$('nftDetailOverlay');
  const detailBox=$('nftDetailBox');
  if(detailOverlay?.classList.contains('show')&&detailBox){
    const activeId=detailBox.dataset.nftId||'';
    if(activeId)openNftDetail(activeId);
  }
  const legalModal=$('legalModal');
  const legalBox=$('legalBox');
  if(legalModal?.classList.contains('show')&&legalBox){
    const activeType=legalBox.dataset.footerPage||'';
    if(activeType)showFooterPage(activeType);
  }
}



function dismissToast(toast){
  if(!toast||toast.classList.contains('is-leaving'))return;
  toast.classList.add('is-leaving');
  window.setTimeout(()=>toast.remove(),150);
}
function showToast(message,type='info',duration=3200){
  const region=$('pncToastRegion');
  if(!region)return;
  const toast=document.createElement('div');
  toast.className='pnc-toast '+(type||'info');
  toast.setAttribute('role',type==='error'?'alert':'status');
  toast.textContent=String(message||'');
  region.appendChild(toast);
  requestAnimationFrame(()=>toast.classList.add('is-visible'));
  window.setTimeout(()=>dismissToast(toast),duration);
}

      {heading:'Creator Economy',body:'Current marketplace rules allocate 95% to the Creator / Seller and 5% to PNC on a primary sale. On resale, 85% goes to the Seller, 10% to the original Creator, and 5% to PNC. The deployed smart contract controls the actual on-chain distribution.'}
    ]
  },
  gettingStarted:{
    title:'Getting Started',updated:'July 20, 2026',sections:[
      {heading:'1. Connect Wallet',body:'Use the Connect button at the top right and connect MetaMask to Sepolia Testnet.'},
      {heading:'2. Create and Mint',body:'Open Creator Center, create a Shop, then create an NFT. Upload the media and metadata to Pinata, review the preview, and approve the Mint transaction in your wallet.'},
      {heading:'3. My Vault and Sale',body:'After Mint is confirmed, the NFT appears in My Vault based on on-chain ownership. From Creator Center, select the Minted NFT and choose List, Offer, or Auction as appropriate.'}
    ]
  },
  creatorGuide:{
    title:'Creator Guide',updated:'July 20, 2026',sections:[
      {heading:'Create Shop',body:'Enter the Shop name, description, image, and optional social links. Register the Shop before selecting it for a new NFT.'},
      {heading:'Create NFT',body:'Select a Shop, enter the NFT name, description, media, and utility information, then create a Draft. Upload the media and metadata to Pinata before Minting.'},
      {heading:'Mint and Manage',body:'Approve the Mint transaction in your wallet. Confirmed NFTs are managed from My Vault and Creator Center. Mint first, then List; sale settings are not part of the NFT creation step.'},
      {heading:'List and Unlist',body:'Only the current on-chain owner can List or Unlist an NFT. Review the displayed price and wallet transaction before confirming.'}
    ]
  },
  auctionGuide:{
    title:'Auction Guide',updated:'July 20, 2026',sections:[
      {heading:'Starting an Auction',body:'The NFT owner selects a start time, duration, starting price, and optional Buy Now price. The NFT is transferred to the Marketplace contract while the Auction is active.'},
      {heading:'Bidding and Buy Now',body:'Each bid requires a wallet transaction. A valid Buy Now transaction ends the Auction immediately. Near the scheduled end, a qualifying bid may extend the Auction under the anti-sniping rule.'},
      {heading:'When You Do Not Win',body:'A non-winning bid is not returned automatically. After the Auction ends, you can receive the refund from the “Refund” button displayed on the applicable NFT card. Approve the refund transaction in your wallet.'},
      {heading:'Finalization',body:'After the Auction has ended, Finalize completes the NFT transfer and sale distribution. Finalize may require a blockchain transaction and gas fee.'}
    ]
  },
  faq:{
    title:'FAQ',updated:'July 20, 2026',sections:[
      {heading:'Where is my Minted or purchased NFT?',body:'Open My Vault after connecting the wallet that currently owns the NFT. My Vault uses on-chain ownership as its reference.'},
      {heading:'Why is my Auction refund not visible in my wallet?',body:'Refunds for non-winning bids are not automatic. After the Auction ends, use the “Refund” button displayed on the applicable NFT card and approve the wallet transaction.'},
      {heading:'What is a gas fee?',body:'A gas fee is paid to the blockchain network for processing a transaction. It is separate from PNC marketplace fees.'},
      {heading:'What does Pending mean?',body:'The wallet or blockchain is still processing the transaction. Do not submit the same action repeatedly; first check the wallet and transaction status.'},
      {heading:'Why does the screen differ from the blockchain?',body:'Temporary delays can occur while data refreshes. On-chain ownership and confirmed contract records are the final reference.'}
    ]
  },
  terms:{
    title:'Terms of Service',updated:'July 17, 2026',sections:[
      {heading:'1. Service',body:'Pi NFT Center (PNC) provides a non-custodial interface for creating, displaying, listing, offering, auctioning, buying, and transferring NFTs. PNC does not act as a bank, broker, investment adviser, or custodian.'},
      {heading:'2. Wallets and Access',body:'Users connect a compatible wallet to use blockchain functions. Users are solely responsible for their wallet, private keys, seed phrases, passwords, devices, approvals, and account security. PNC does not request, receive, or store private keys or seed phrases.'},
      {heading:'3. NFTs and User Content',body:'Creators are responsible for all images, media, metadata, descriptions, utilities, claims, and other content they upload or mint. Users must have all rights and permissions required for that content. Minting or trading an NFT does not by itself transfer copyright or commercial rights unless the rights holder expressly states otherwise.'},
      {heading:'4. Marketplace Transactions',body:'Sellers set prices and auction terms. Blockchain transactions may be irreversible after confirmation. On-chain ownership, transaction, listing, offer, bid, purchase, and auction records are the final reference when they differ from a temporary interface display.'},
      {heading:'5. Offers, Auctions, and Buy Now',body:'Offers may require funds to be held by the Marketplace contract. Auctions may include scheduled starts, reserve prices, Buy Now prices, anti-sniping extensions, refunds, and permissionless finalization. Users must review transaction details before confirming them in their wallet.'},
      {heading:'6. Fees',body:'Marketplace fees and creator royalties are described in the Fees section. Network gas fees are separate and are paid to the blockchain network, not to PNC. Applicable rates may be updated with reasonable notice.'},
      {heading:'7. Prohibited Activities',body:'Users may not upload or trade stolen works, illegal content, infringing content, fraudulent or misleading metadata, impersonations, scams, spam, malicious code, abusive bots, market manipulation, or content that violates another person’s rights.'},
      {heading:'8. Suspension and Removal',body:'PNC may restrict interface access, hide content from its interface, or respond to valid legal and rights-holder requests. Blockchain records and IPFS content may remain available independently of the PNC interface.'},
      {heading:'9. No Warranty and Limitation',body:'The service is provided on an “as is” and “as available” basis. To the maximum extent permitted by law, PNC does not guarantee uninterrupted availability, error-free smart contracts, asset value, transaction completion, or recovery of lost wallet access.'},
      {heading:'10. Changes',body:'PNC may update these terms as the service, supported networks, laws, or features change. Continued use after an update means acceptance of the revised terms.'}
    ]
  },
  privacy:{
    title:'Privacy Policy',updated:'July 17, 2026',sections:[
      {heading:'1. Information Processed',body:'PNC may process public wallet addresses, collection and NFT information, metadata, transaction hashes, contract events, network information, and user-provided content needed to operate the marketplace interface.'},
      {heading:'2. Information Not Collected',body:'PNC does not request or store private keys, seed phrases, wallet passwords, credit-card details, or wallet funds. A wallet connection does not automatically reveal a user’s legal name or private contact information.'},
      {heading:'3. Storage and Infrastructure',body:'Public NFT media and metadata may be stored through Pinata and IPFS. Application state may be stored through Vercel services, browser localStorage, and related infrastructure. Blockchain transactions are stored publicly and may be permanent.'},
      {heading:'4. Browser Data',body:'PNC may use localStorage and similar browser storage to preserve drafts, metadata cache, display preferences, and marketplace state. Essential storage supports service operation. Analytics or non-essential cookies will be disclosed when introduced.'},
      {heading:'5. Service Providers',body:'PNC relies on third-party infrastructure such as wallet providers, blockchain networks, RPC services, Pinata, IPFS, Vercel, and related hosting or storage providers. Their own policies may apply.'},
      {heading:'6. Sharing and Disclosure',body:'PNC does not sell personal information. Information may be disclosed when required by law, to protect users or the service, to investigate abuse, or to operate the service through necessary providers.'},
      {heading:'7. Public Blockchain Notice',body:'Wallet addresses and transactions are public. Even when PNC removes information from its interface, blockchain records and IPFS content may remain accessible through third-party tools.'},
      {heading:'8. Policy Updates',body:'This policy may be updated as PNC adds networks, analytics, payment options, or other services.'}
    ]
  },
  fees:{
    title:'Fees',updated:'July 17, 2026',sections:[
      {heading:'Primary Sale',body:'Creator / Seller: 95%\nPNC Marketplace Fee: 5%'},
      {heading:'Resale',body:'Seller: 85%\nCreator Royalty: 10%\nPNC Marketplace Fee: 5%'},
      {heading:'Applicable Transaction Types',body:'The applicable sale distribution is used for fixed-price Buy, accepted Offer, completed Auction, and Auction Buy Now transactions.'},
      {heading:'Network Fees',body:'Gas fees and other blockchain charges are separate from marketplace fees. They are determined by the network and wallet and are generally non-refundable, including when a transaction fails or is rejected on-chain.'},
      {heading:'Future Changes',body:'Fee and royalty rules may change before or after Pi Mainnet launch. The current Fees section is the public reference for the interface, while the deployed smart contract controls the actual on-chain distribution for each transaction.'}
    ]
  },
  copyright:{
    title:'Copyright Policy',updated:'July 17, 2026',sections:[
      {heading:'1. Creator Rights',body:'Creators retain copyright and other intellectual-property rights unless they validly transfer or license those rights. Minting an NFT records a token; it does not automatically prove authorship or transfer copyright.'},
      {heading:'2. Buyer Rights',body:'Buying an NFT transfers ownership of the token only. Copyright, commercial-use rights, reproduction rights, and derivative-work rights remain with the rights holder unless separate license terms expressly grant them.'},
      {heading:'3. User Responsibility',body:'Users must not mint, list, sell, or display content they do not have permission to use. Metadata must not falsely claim authorship, affiliation, licensing, or authenticity.'},
      {heading:'4. Infringement Reports',body:'Rights holders may report allegedly infringing content with identification of the protected work, the NFT or collection involved, contact information, a good-faith statement, and evidence of authority. PNC may hide reported content from its interface while reviewing the report.'},
      {heading:'5. Blockchain and IPFS Limits',body:'PNC may restrict or remove content from its own interface, but it may not be able to delete tokens, blockchain history, or files stored through decentralized systems.'},
      {heading:'6. DMCA and Equivalent Procedures',body:'PNC intends to maintain a rights-reporting process consistent with applicable copyright laws, including DMCA-style notice and counter-notice procedures where relevant.'}
    ]
  },
  disclaimer:{
    title:'Disclaimer',updated:'July 17, 2026',sections:[
      {heading:'Testnet Status',body:'The current PNC deployment operates on Sepolia Testnet. Testnet assets and SepoliaETH have no guaranteed monetary value. Features, contracts, data, and availability may change before Pi Mainnet release.'},
      {heading:'No Investment Advice',body:'Nothing on PNC is financial, investment, legal, tax, or accounting advice. NFT prices are speculative and may fall to zero. Users must make their own decisions and obtain professional advice when appropriate.'},
      {heading:'Wallet Risk',body:'PNC cannot restore private keys, seed phrases, passwords, lost devices, or compromised wallets. Wallet approvals and transaction confirmations are controlled by the user and the wallet provider.'},
      {heading:'Blockchain and Smart Contract Risk',body:'Transactions may fail, be delayed, be reorganized, or become expensive. Smart contracts may contain defects or behave unexpectedly. Network congestion, RPC outages, forks, or third-party failures may affect access and transactions.'},
      {heading:'Gas and Refunds',body:'Gas fees are paid to the network and are generally not refundable. Bid refunds and other contract-held balances require the user to complete the available on-chain withdrawal process.'},
      {heading:'Third-Party Content and Services',body:'PNC does not guarantee the accuracy, legality, authenticity, availability, or value of user-created NFTs or third-party services, links, wallets, gateways, hosting providers, or blockchain infrastructure.'},
      {heading:'User Responsibility',body:'Users are responsible for reviewing NFT content, ownership, licenses, prices, fees, transaction details, contract addresses, network selection, and wallet prompts before acting.'}
    ]
  }
}),

  terms:{title:'利用規約',updated:'2026年7月17日',sections:[
    {heading:'1. サービス',body:'Pi NFT Center（PNC）は、NFTの作成、表示、出品、オファー、オークション、購入、送信を行うためのノンカストディアル型インターフェースを提供します。PNCは銀行、証券会社、投資助言業者、資産保管業者ではありません。'},
    {heading:'2. ウォレットとアクセス',body:'ユーザーは対応ウォレットを接続してブロックチェーン機能を使用します。ウォレット、秘密鍵、シードフレーズ、パスワード、端末、承認、アカウントの安全管理はユーザー自身の責任です。PNCが秘密鍵やシードフレーズを要求、取得、保存することはありません。'},
    {heading:'3. NFTとユーザーコンテンツ',body:'クリエイターは、アップロードまたはミントする画像、メディア、メタデータ、説明、ユーティリティ、表明、その他のコンテンツに責任を負います。ユーザーはそのコンテンツに必要な権利と許可を保有していなければなりません。権利者が別途明示しない限り、NFTのミントや取引だけで著作権や商用利用権が移転することはありません。'},
    {heading:'4. マーケット取引',body:'出品者が価格とオークション条件を設定します。ブロックチェーントランザクションは確定後に取り消せない場合があります。一時的な画面表示と異なる場合、オンチェーンの所有権、取引、出品、オファー、入札、購入、オークション記録が最終基準です。'},
    {heading:'5. オファー、オークション、即決購入',body:'オファーでは資金がMarketplaceコントラクトへ預けられる場合があります。オークションには開始日時、開始価格、即決価格、自動延長、返金、誰でも実行できる確定処理が含まれる場合があります。ウォレットで承認する前にトランザクション内容を確認してください。'},
    {heading:'6. 手数料',body:'マーケット手数料とクリエイターロイヤリティは手数料ページに記載します。ネットワークガス代は別途発生し、PNCではなくブロックチェーンネットワークへ支払われます。適用料率は合理的な事前通知により変更される場合があります。'},
    {heading:'7. 禁止行為',body:'盗用作品、違法コンテンツ、権利侵害コンテンツ、虚偽または誤解を招くメタデータ、なりすまし、詐欺、スパム、悪意あるコード、不正ボット、相場操縦、他者の権利を侵害するコンテンツをアップロードまたは取引してはなりません。'},
    {heading:'8. 利用制限と表示削除',body:'PNCは、インターフェースへのアクセス制限、コンテンツの非表示、適法な行政機関や権利者からの申立てへの対応を行う場合があります。ブロックチェーン記録やIPFSコンテンツはPNCのインターフェースとは独立して残る場合があります。'},
    {heading:'9. 無保証と責任制限',body:'本サービスは「現状有姿」かつ「提供可能な範囲」で提供されます。法令で認められる最大限の範囲で、PNCは中断のない利用、スマートコントラクトの無欠陥、資産価値、取引完了、失われたウォレットへのアクセス回復を保証しません。'},
    {heading:'10. 変更',body:'PNCは、サービス、対応ネットワーク、法令、機能の変更に応じて本規約を更新する場合があります。更新後も利用を継続した場合、改定後の規約に同意したものとみなされます。'}
  ]},
  privacy:{title:'プライバシーポリシー',updated:'2026年7月17日',sections:[
    {heading:'1. 処理する情報',body:'PNCは、マーケットプレイスの運営に必要な公開ウォレットアドレス、コレクション情報、NFT情報、メタデータ、トランザクションハッシュ、コントラクトイベント、ネットワーク情報、ユーザー提供コンテンツを処理する場合があります。'},
    {heading:'2. 収集しない情報',body:'PNCは秘密鍵、シードフレーズ、ウォレットパスワード、クレジットカード情報、ウォレット内資金を要求または保存しません。ウォレット接続だけで、ユーザーの実名や非公開の連絡先が自動的に開示されることはありません。'},
    {heading:'3. 保存先とインフラ',body:'公開NFTメディアとメタデータはPinataおよびIPFSに保存される場合があります。アプリ状態はVercelサービス、ブラウザのlocalStorage、関連インフラに保存される場合があります。ブロックチェーントランザクションは公開され、永続的に残る可能性があります。'},
    {heading:'4. ブラウザデータ',body:'PNCは下書き、メタデータキャッシュ、表示設定、マーケット状態を保持するためにlocalStorageなどのブラウザ保存機能を使用する場合があります。サービス運営に必要な保存機能を使用します。分析用または必須でないCookieを導入する場合は別途開示します。'},
    {heading:'5. 外部サービス',body:'PNCはウォレットプロバイダー、ブロックチェーンネットワーク、RPCサービス、Pinata、IPFS、Vercel、関連するホスティングおよび保存事業者などの第三者インフラを利用します。各事業者のポリシーが適用される場合があります。'},
    {heading:'6. 共有と開示',body:'PNCは個人情報を販売しません。法令上必要な場合、ユーザーやサービスを保護する場合、不正利用を調査する場合、必要な事業者を通じてサービスを運営する場合に情報を開示することがあります。'},
    {heading:'7. 公開ブロックチェーンに関する注意',body:'ウォレットアドレスとトランザクションは公開情報です。PNCのインターフェースから情報を削除しても、ブロックチェーン記録やIPFSコンテンツは第三者ツールから参照できる場合があります。'},
    {heading:'8. ポリシーの更新',body:'PNCがネットワーク、分析機能、決済手段、その他のサービスを追加する際、本ポリシーを更新する場合があります。'}
  ]},

  copyright:{title:'著作権ポリシー',updated:'2026年7月17日',sections:[

    {heading:'2. 購入者の権利',body:'NFTの購入で移転するのはトークンの所有権だけです。別途ライセンス条件で明示的に許諾されない限り、著作権、商用利用権、複製権、二次的著作物を作成する権利は権利者に残ります。'},
    {heading:'3. ユーザーの責任',body:'使用許可のないコンテンツをミント、出品、販売、表示してはなりません。メタデータで著作者、所属、ライセンス、真正性について虚偽の表示をしてはなりません。'},
    {heading:'4. 権利侵害の申告',body:'権利者は、保護対象作品、該当するNFTまたはコレクション、連絡先、誠実な申告、権限を示す資料を添えて権利侵害の疑いを申告できます。PNCは確認中、該当コンテンツをインターフェース上で非表示にする場合があります。'},
    {heading:'5. ブロックチェーンとIPFSの制約',body:'PNCは自らのインターフェース上でコンテンツを制限または削除できますが、分散型システムに保存されたトークン、ブロックチェーン履歴、ファイルを削除できない場合があります。'},
    {heading:'6. DMCAおよび同等の手続',body:'PNCは、適用される著作権法に沿った権利申告手続を整備し、必要に応じてDMCA型の通知および反対通知手続に対応する予定です。'}

  disclaimer:{title:'免責事項',updated:'2026年7月17日',sections:[

    {heading:'ウォレットのリスク',body:'PNCは秘密鍵、シードフレーズ、パスワード、紛失した端末、侵害されたウォレットを復旧できません。ウォレット承認とトランザクション確認はユーザーとウォレットプロバイダーが管理します。'},

  ko:Object.freeze({
about:{title:'Pi NFT Center 소개',updated:'2026년 7월 20일',sections:[
{heading:'Pi NFT Center',body:'Pi NFT Center(PNC)는 Pi 생태계를 위해 개발 중인 크리에이터 중심 NFT 마켓플레이스입니다. 현재 공개 테스트 버전은 Sepolia Testnet에서 운영되며 향후 Pi Mainnet 지원을 준비하고 있습니다.'},
{heading:'마켓플레이스 구조',body:'크리에이터는 샵을 만들고 NFT 미디어와 메타데이터를 업로드한 뒤 민트할 수 있습니다. 민트 후에는 My Vault에서 관리하고 고정가 판매, 오퍼, 경매를 이용할 수 있습니다.'},

gettingStarted:{title:'시작하기',updated:'2026년 7월 20일',sections:[
{heading:'1. 지갑 연결',body:'오른쪽 위 연결 버튼을 사용해 MetaMask를 Sepolia Testnet에 연결합니다.'},
{heading:'2. 생성과 민트',body:'Creator Center에서 샵을 만든 뒤 NFT를 만듭니다. 미디어와 메타데이터를 Pinata에 업로드하고 미리보기를 확인한 후 지갑에서 민트 트랜잭션을 승인합니다.'},
{heading:'3. My Vault와 판매',body:'민트가 확정되면 온체인 소유권을 기준으로 NFT가 My Vault에 표시됩니다. Creator Center에서 민트된 NFT를 선택해 판매 등록, 오퍼, 경매를 이용할 수 있습니다.'}]},
creatorGuide:{title:'크리에이터 가이드',updated:'2026년 7월 20일',sections:[
{heading:'샵 만들기',body:'샵 이름, 설명, 이미지, 선택 사항인 소셜 링크를 입력합니다. 새 NFT에서 선택하기 전에 샵을 등록하세요.'},
{heading:'NFT 만들기',body:'샵을 선택하고 NFT 이름, 설명, 미디어, 유틸리티 정보를 입력해 초안을 만듭니다. 민트 전에 미디어와 메타데이터를 Pinata에 업로드하세요.'},
{heading:'민트와 관리',body:'지갑에서 민트 트랜잭션을 승인합니다. 확정된 NFT는 My Vault와 Creator Center에서 관리합니다. NFT 생성 단계에서는 판매 설정을 하지 않고 민트 후에 판매 등록합니다.'},
{heading:'판매 등록과 취소',body:'NFT를 판매 등록하거나 취소할 수 있는 사람은 현재 온체인 소유자뿐입니다. 확정 전에 표시 가격과 지갑 트랜잭션 내용을 확인하세요.'}]},
auctionGuide:{title:'경매 가이드',updated:'2026년 7월 20일',sections:[
{heading:'경매 시작',body:'NFT 소유자가 시작 시간, 기간, 시작 가격, 선택 사항인 즉시 구매가를 설정합니다. 경매 중 NFT는 Marketplace 컨트랙트로 이동합니다.'},
{heading:'입찰과 즉시 구매',body:'각 입찰에는 지갑 트랜잭션이 필요합니다. 유효한 즉시 구매가 실행되면 경매는 바로 종료됩니다. 종료 직전 입찰은 자동 연장 규칙에 따라 종료 시간을 연장할 수 있습니다.'},
{heading:'낙찰되지 않은 경우',body:'낙찰되지 않은 입찰금은 자동 환불되지 않습니다. 경매 종료 후 해당 NFT 카드에 표시되는 “환불 받기” 버튼에서 지갑 트랜잭션을 승인하세요.'},
{heading:'확정 처리',body:'경매 종료 후 확정을 실행하면 NFT 이전과 대금 분배가 완료됩니다. 확정에는 블록체인 트랜잭션과 가스비가 필요할 수 있습니다.'}]},
faq:{title:'자주 묻는 질문',updated:'2026년 7월 20일',sections:[
{heading:'민트하거나 구매한 NFT는 어디에 있나요?',body:'현재 NFT를 소유한 지갑을 연결한 후 My Vault를 여세요. My Vault는 온체인 소유권을 기준으로 표시합니다.'},
{heading:'경매 환불이 지갑에 보이지 않는 이유는 무엇인가요?',body:'낙찰되지 않은 입찰 환불은 자동이 아닙니다. 경매 종료 후 해당 NFT 카드의 “환불 받기” 버튼을 사용하고 지갑 트랜잭션을 승인하세요.'},
{heading:'가스비란 무엇인가요?',body:'가스비는 블록체인에서 트랜잭션을 처리하기 위해 네트워크에 지불하는 비용입니다. PNC 마켓 수수료와는 별도입니다.'},
{heading:'Pending은 무엇을 의미하나요?',body:'지갑 또는 블록체인이 트랜잭션을 처리 중이라는 뜻입니다. 같은 작업을 반복 전송하지 말고 먼저 지갑과 트랜잭션 상태를 확인하세요.'},
{heading:'화면과 블록체인 정보가 다른 이유는 무엇인가요?',body:'데이터가 갱신되는 동안 일시적인 지연이 발생할 수 있습니다. 최종 기준은 온체인 소유권과 확정된 컨트랙트 기록입니다.'}]},
terms:{title:'이용약관',updated:'2026년 7월 17일',sections:[
{heading:'1. 서비스',body:'Pi NFT Center(PNC)는 NFT의 생성, 표시, 판매 등록, 오퍼, 경매, 구매, 전송을 위한 비수탁형 인터페이스를 제공합니다. PNC는 은행, 브로커, 투자자문업자 또는 자산 보관업자가 아닙니다.'},
{heading:'2. 지갑과 접근',body:'사용자는 호환 지갑을 연결해 블록체인 기능을 사용합니다. 지갑, 개인키, 시드 문구, 비밀번호, 기기, 승인, 계정 보안은 사용자 책임입니다. PNC는 개인키나 시드 문구를 요구, 수신, 저장하지 않습니다.'},
{heading:'3. NFT와 사용자 콘텐츠',body:'크리에이터는 업로드 또는 민트하는 이미지, 미디어, 메타데이터, 설명, 유틸리티, 기타 콘텐츠에 책임이 있습니다. 사용자는 해당 콘텐츠에 필요한 모든 권리와 허가를 보유해야 합니다. 권리자가 별도로 명시하지 않는 한 NFT 민트나 거래만으로 저작권 또는 상업적 이용권이 이전되지 않습니다.'},
{heading:'4. 마켓 거래',body:'판매자는 가격과 경매 조건을 설정합니다. 블록체인 트랜잭션은 확정 후 취소할 수 없을 수 있습니다. 일시적인 화면 표시와 다를 경우 온체인 소유권, 거래, 판매 등록, 오퍼, 입찰, 구매, 경매 기록이 최종 기준입니다.'},
{heading:'5. 오퍼, 경매, 즉시 구매',body:'오퍼에는 자금이 Marketplace 컨트랙트에 예치될 수 있습니다. 경매에는 예약 시작, 시작 가격, 즉시 구매가, 자동 연장, 환불, 누구나 실행할 수 있는 확정 처리가 포함될 수 있습니다. 지갑에서 승인하기 전에 트랜잭션 내용을 확인하세요.'},
{heading:'6. 수수료',body:'마켓 수수료와 크리에이터 로열티는 수수료 페이지에 설명됩니다. 네트워크 가스비는 별도이며 PNC가 아니라 블록체인 네트워크에 지불됩니다. 적용 요율은 합리적인 사전 안내 후 변경될 수 있습니다.'},
{heading:'7. 금지 행위',body:'도난 작품, 불법 콘텐츠, 권리 침해 콘텐츠, 허위 또는 오해를 유발하는 메타데이터, 사칭, 사기, 스팸, 악성 코드, 악용 봇, 시세 조작, 타인의 권리를 침해하는 콘텐츠를 업로드하거나 거래해서는 안 됩니다.'},
{heading:'8. 이용 제한과 표시 제거',body:'PNC는 인터페이스 접근 제한, 콘텐츠 비표시, 적법한 기관 또는 권리자의 요청 대응을 할 수 있습니다. 블록체인 기록과 IPFS 콘텐츠는 PNC 인터페이스와 별개로 남을 수 있습니다.'},
{heading:'9. 무보증과 책임 제한',body:'서비스는 “있는 그대로” 및 “이용 가능한 범위”에서 제공됩니다. 법이 허용하는 최대 범위에서 PNC는 중단 없는 이용, 오류 없는 스마트 컨트랙트, 자산 가치, 거래 완료, 분실된 지갑 접근 복구를 보장하지 않습니다.'},
{heading:'10. 변경',body:'PNC는 서비스, 지원 네트워크, 법률, 기능 변경에 따라 본 약관을 업데이트할 수 있습니다. 업데이트 후 계속 이용하면 개정 약관에 동의한 것으로 간주됩니다.'}]},
privacy:{title:'개인정보처리방침',updated:'2026년 7월 17일',sections:[
{heading:'1. 처리하는 정보',body:'PNC는 마켓플레이스 운영에 필요한 공개 지갑 주소, 컬렉션과 NFT 정보, 메타데이터, 트랜잭션 해시, 컨트랙트 이벤트, 네트워크 정보, 사용자 제공 콘텐츠를 처리할 수 있습니다.'},
{heading:'2. 수집하지 않는 정보',body:'PNC는 개인키, 시드 문구, 지갑 비밀번호, 신용카드 정보, 지갑 자금을 요구하거나 저장하지 않습니다. 지갑 연결만으로 사용자의 실명이나 비공개 연락처가 자동으로 공개되지 않습니다.'},
{heading:'3. 저장과 인프라',body:'공개 NFT 미디어와 메타데이터는 Pinata 및 IPFS에 저장될 수 있습니다. 앱 상태는 Vercel 서비스, 브라우저 localStorage, 관련 인프라에 저장될 수 있습니다. 블록체인 트랜잭션은 공개되며 영구적으로 남을 수 있습니다.'},
{heading:'4. 브라우저 데이터',body:'PNC는 초안, 메타데이터 캐시, 표시 설정, 마켓 상태를 유지하기 위해 localStorage와 같은 브라우저 저장 기능을 사용할 수 있습니다. 필수 저장 기능은 서비스 운영을 지원합니다. 분석 또는 비필수 쿠키를 도입할 경우 별도로 공개합니다.'},
{heading:'5. 외부 서비스',body:'PNC는 지갑 제공자, 블록체인 네트워크, RPC 서비스, Pinata, IPFS, Vercel, 관련 호스팅 또는 저장 서비스 등 제3자 인프라를 이용합니다. 각 서비스의 정책이 적용될 수 있습니다.'},
{heading:'6. 공유와 공개',body:'PNC는 개인정보를 판매하지 않습니다. 법률상 필요한 경우, 사용자 또는 서비스를 보호하는 경우, 악용을 조사하는 경우, 필요한 서비스 제공자를 통해 서비스를 운영하는 경우 정보를 공개할 수 있습니다.'},
{heading:'7. 공개 블록체인 안내',body:'지갑 주소와 트랜잭션은 공개 정보입니다. PNC 인터페이스에서 정보를 제거해도 블록체인 기록과 IPFS 콘텐츠는 제3자 도구를 통해 계속 접근할 수 있습니다.'},
{heading:'8. 정책 업데이트',body:'PNC가 네트워크, 분석 기능, 결제 옵션 또는 기타 서비스를 추가할 때 본 정책을 업데이트할 수 있습니다.'}]},
fees:{title:'수수료',updated:'2026년 7월 17일',sections:[
{heading:'최초 판매',body:'크리에이터/판매자: 95%\nPNC 마켓 수수료: 5%'},
{heading:'재판매',body:'판매자: 85%\n크리에이터 로열티: 10%\nPNC 마켓 수수료: 5%'},
{heading:'적용 거래 유형',body:'고정가 구매, 수락된 오퍼, 완료된 경매, 경매 즉시 구매에 해당 판매 분배 규칙이 적용됩니다.'},
{heading:'네트워크 수수료',body:'가스비와 기타 블록체인 비용은 마켓 수수료와 별도입니다. 네트워크와 지갑이 결정하며 트랜잭션이 실패하거나 온체인에서 거부된 경우에도 일반적으로 환불되지 않습니다.'},
{heading:'향후 변경',body:'수수료와 로열티 규칙은 Pi Mainnet 출시 전후에 변경될 수 있습니다. 화면의 최신 수수료 페이지가 공개 기준이며 각 거래의 실제 온체인 분배는 배포된 스마트 컨트랙트가 처리합니다.'}]},
copyright:{title:'저작권 정책',updated:'2026년 7월 17일',sections:[
{heading:'1. 크리에이터 권리',body:'유효한 양도 또는 라이선스가 없는 한 저작권 및 기타 지식재산권은 크리에이터에게 남습니다. NFT 민트는 토큰을 기록하는 것이며 저작자임을 자동으로 증명하거나 저작권을 이전하지 않습니다.'},
{heading:'2. 구매자 권리',body:'NFT 구매로 이전되는 것은 토큰 소유권뿐입니다. 별도의 라이선스 조건으로 명시적으로 허용되지 않는 한 저작권, 상업적 이용권, 복제권, 2차적 저작물 작성권은 권리자에게 남습니다.'},
{heading:'3. 사용자 책임',body:'사용 허가가 없는 콘텐츠를 민트, 판매 등록, 판매, 표시해서는 안 됩니다. 메타데이터로 저작자, 소속, 라이선스, 진위 여부를 허위로 주장해서는 안 됩니다.'},
{heading:'4. 권리 침해 신고',body:'권리자는 보호 대상 작품, 관련 NFT 또는 컬렉션, 연락처, 선의의 진술, 권한 증빙과 함께 침해 의심 콘텐츠를 신고할 수 있습니다. PNC는 검토 중 해당 콘텐츠를 인터페이스에서 숨길 수 있습니다.'},
{heading:'5. 블록체인과 IPFS의 제한',body:'PNC는 자체 인터페이스에서 콘텐츠를 제한하거나 제거할 수 있지만 분산형 시스템에 저장된 토큰, 블록체인 기록, 파일을 삭제하지 못할 수 있습니다.'},
{heading:'6. DMCA 및 동등 절차',body:'PNC는 적용 가능한 저작권법에 맞는 권리 신고 절차를 유지하고 필요한 경우 DMCA 방식의 통지 및 반대 통지 절차를 지원할 예정입니다.'}]},
disclaimer:{title:'면책조항',updated:'2026년 7월 17일',sections:[
{heading:'테스트넷 상태',body:'현재 PNC는 Sepolia Testnet에서 운영됩니다. 테스트넷 자산과 SepoliaETH에는 보장된 금전적 가치가 없습니다. Pi Mainnet 출시 전 기능, 컨트랙트, 데이터, 이용 가능성이 변경될 수 있습니다.'},
{heading:'투자 조언 아님',body:'PNC의 어떤 정보도 금융, 투자, 법률, 세무, 회계 조언이 아닙니다. NFT 가격은 투기적이며 0이 될 수 있습니다. 사용자는 스스로 판단하고 필요할 경우 전문가의 조언을 받아야 합니다.'},
{heading:'지갑 위험',body:'PNC는 개인키, 시드 문구, 비밀번호, 분실한 기기, 탈취된 지갑을 복구할 수 없습니다. 지갑 승인과 트랜잭션 확인은 사용자와 지갑 제공자가 관리합니다.'},
{heading:'블록체인과 스마트 컨트랙트 위험',body:'트랜잭션은 실패, 지연, 재구성되거나 비용이 상승할 수 있습니다. 스마트 컨트랙트에 결함이 있거나 예상과 다르게 작동할 수 있습니다. 네트워크 혼잡, RPC 장애, 포크, 제3자 서비스 장애가 이용과 거래에 영향을 줄 수 있습니다.'},
{heading:'가스비와 환불',body:'가스비는 네트워크에 지불되며 일반적으로 환불되지 않습니다. 입찰 환불과 같은 컨트랙트 보관 잔액을 받으려면 사용자가 이용 가능한 온체인 출금 절차를 완료해야 합니다.'},
{heading:'제3자 콘텐츠와 서비스',body:'PNC는 사용자 생성 NFT 또는 제3자 서비스, 링크, 지갑, 게이트웨이, 호스팅 제공자, 블록체인 인프라의 정확성, 적법성, 진위성, 이용 가능성, 가치를 보장하지 않습니다.'},
{heading:'사용자 책임',body:'사용자는 작업 전에 NFT 콘텐츠, 소유권, 라이선스, 가격, 수수료, 트랜잭션 내용, 컨트랙트 주소, 네트워크, 지갑 확인 화면을 검토할 책임이 있습니다.'}]}
}),

function emptyCreatorState(){return{shopDraft:null,nftDraft:null,registeredShops:[],mintedNfts:[]};}
function emptyShopSocial(){return{x:'',lineOpenChat:''};}
function normalizeShopSocial(value){const source=value&&typeof value==='object'?value:{};return{x:String(source.x||'').trim(),lineOpenChat:String(source.lineOpenChat||source.line||'').trim()};}
const PNC_SOCIAL_DOMAINS={x:['x.com','twitter.com'],lineOpenChat:['line.me','openchat.line.me']};
function socialUrlValidation(value,type){const url=String(value||'').trim();if(!url)return{ok:true,url:''};try{const parsed=new URL(url);if(parsed.protocol!=='https:')return{ok:false,message:t('urlValidation.httpsRequired')};const host=parsed.hostname.toLowerCase().replace(/\.$/,'');const allowed=PNC_SOCIAL_DOMAINS[type]||[];const matched=allowed.some(domain=>host===domain||host.endsWith('.'+domain));if(!matched)return{ok:false,message:type==='x'?t('urlValidation.xDomainRequired'):t('urlValidation.lineDomainRequired')};return{ok:true,url:parsed.href};}catch(e){return{ok:false,message:t('urlValidation.invalidUrl')};}}
function shopSocialHtml(shop){const social=normalizeShopSocial(shop&&shop.social);const links=[];if(socialUrlValidation(social.x,'x').ok&&social.x)links.push(`<a class="shop-social-link" href="${esc(social.x)}" target="_blank" rel="nofollow ugc noopener noreferrer">${footerIconHtml('x')}<span>X</span></a>`);if(socialUrlValidation(social.lineOpenChat,'lineOpenChat').ok&&social.lineOpenChat)links.push(`<a class="shop-social-link" href="${esc(social.lineOpenChat)}" target="_blank" rel="nofollow ugc noopener noreferrer"><span>LINE</span></a>`);return links.length?`<div class="shop-social-links">${links.join('')}</div>`:'';}

function setMenuOpen(open){
  const menu=$('menu'),button=$('menuToggleBtn');
  if(!menu)return;
  const shouldOpen=!!open;
  if(!shouldOpen&&menu.contains(document.activeElement)&&button)button.focus({preventScroll:true});
  menu.classList.toggle('show',shouldOpen);
  menu.setAttribute('aria-hidden',shouldOpen?'false':'true');
  if(button){button.setAttribute('aria-expanded',shouldOpen?'true':'false');button.setAttribute('aria-label',shouldOpen?t('header.closeMenu'):t('header.openMenu'));}
}
function toggleMenu(){setMenuOpen(!$('menu')?.classList.contains('show'));}
function languageDisplayName(code){return i18nValue(PNC_I18N[code],'common.languageName')||code;}
function renderLanguageMenuState(){
  const current=getLanguage();
  const currentName=$('currentLanguageName');
  if(currentName)currentName.textContent=languageDisplayName(current);
  document.querySelectorAll('.language-option[data-language]').forEach(button=>{
    const code=normalizeLanguageCode(button.dataset.language);
    const available=PNC_AVAILABLE_LANGUAGES.includes(code);
    const active=available&&code===current;
    button.disabled=!available;
    button.setAttribute('aria-disabled',available?'false':'true');
    button.setAttribute('aria-pressed',active?'true':'false');
    button.classList.toggle('is-current',active);
    button.classList.toggle('is-preparing',!available);
    const status=button.querySelector('.language-option-status');
    if(status)status.textContent=active?t('language.current'):available?'':t('language.preparing');
  });
}
function selectLanguage(code){
  const next=normalizeLanguageCode(code);
  if(!PNC_AVAILABLE_LANGUAGES.includes(next))return;
  const previous=getLanguage();
  setLanguage(next);
  rerenderLanguageUI();
  setMenuOpen(false);
  showToast(previous===next?(next==='en'?t('language.englishSelected'):t('language.changed',{language:languageDisplayName(next)})):t('language.changed',{language:languageDisplayName(next)}),'success',2200);
}

      throw new Error(t('dataError.listingMismatch'));
    }
    return listing.active?{status:'listed',listing}:{status:'not_for_sale'};

function applyMarketplaceStateToNFT(state,nft,result){
  if(!nft)return;
  state.market.listings=state.market.listings.filter(x=>x.nftId!==nft.id);
  delete nft.marketReadError;
  if(result&&result.status==='listed'&&result.listing){
    const listing=result.listing;
    nft.status='listed';
    nft.priceWei=listing.priceWei;
    nft.priceEth=weiToEth(listing.priceWei);
    nft.seller=listing.seller;
    nft.listingId=String(listing.listingId);
    state.market.listings.push({listingId:nft.listingId,nftId:nft.id,priceWei:nft.priceWei,seller:nft.seller});
    return;
  }
  nft.seller='';
  nft.listingId='0';
  delete nft.priceWei;
  delete nft.priceEth;
  if(result&&result.status==='read_error'){
    nft.status='market_read_error';
    nft.marketReadError=result.error||'Marketplace read failed';
    state.errors.push((nft.name||nft.id)+' marketplace read error: '+nft.marketReadError);
    return;
  }
  nft.status='not_for_sale';
}

function formatBytes(bytes){
  const value=Number(bytes||0);
  if(value<1024)return value+' B';
  if(value<1024*1024)return (value/1024).toFixed(1)+' KB';
  return (value/(1024*1024)).toFixed(2)+' MB';
}
async function loadImageForOptimization(file){
  if(!file)throw new Error(t('mediaError.imageMissing'));
  if('createImageBitmap' in window){
    try{return await createImageBitmap(file,{imageOrientation:'from-image'});}catch(e){}
  }
  return await new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{URL.revokeObjectURL(url);resolve(img);};
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error(t('mediaError.imageDecodeFailed')));};
    img.src=url;
  });
}
async function optimizeImageFile(file,{maxSide=1600,quality=.86,label='display'}={}){
  const source=await loadImageForOptimization(file);
  const sourceWidth=source.width||source.naturalWidth;
  const sourceHeight=source.height||source.naturalHeight;
  if(!sourceWidth||!sourceHeight)throw new Error(t('mediaError.imageDimensions'));
  const scale=Math.min(1,maxSide/Math.max(sourceWidth,sourceHeight));
  const width=Math.max(1,Math.round(sourceWidth*scale));
  const height=Math.max(1,Math.round(sourceHeight*scale));
  const canvas=document.createElement('canvas');
  canvas.width=width;
  canvas.height=height;
  const ctx=canvas.getContext('2d',{alpha:true});
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';
  ctx.drawImage(source,0,0,width,height);
  if(source.close)source.close();
  const blob=await new Promise((resolve,reject)=>canvas.toBlob(b=>b?resolve(b):reject(new Error(t('mediaError.webpConversionFailed'))),'image/webp',quality));
  const base=(file.name||'pnc-image').replace(/\.[^.]+$/,'').replace(/[^a-z0-9_-]+/gi,'_');
  const optimized=new File([blob],`${base}_${label}.webp`,{type:'image/webp',lastModified:Date.now()});
  return{file:optimized,width,height,bytes:optimized.size,originalBytes:file.size,originalWidth:sourceWidth,originalHeight:sourceHeight,quality,label};
}
async function buildStaticImagePipeline(file){
  const [display,thumbnail]=await Promise.all([
    optimizeImageFile(file,{maxSide:1600,quality:.86,label:'display'}),
    optimizeImageFile(file,{maxSide:480,quality:.78,label:'thumbnail'})
  ]);
  return{display,thumbnail,original:{name:file.name,bytes:file.size}};
}
async function buildVideoThumbnailPipeline(file){
  const thumbnail=await optimizeImageFile(file,{maxSide:720,quality:.82,label:'video_thumbnail'});
  return{thumbnail,original:{name:file.name,bytes:file.size}};
}

async function registerLegacyResaleOrigin(id){
  if(!requireWallet())return;
  const n=PNC_STATE.nfts.find(x=>x.id===id);
  if(!n||!n.tokenId)return;
  if(lc(PNC_STATE.wallet)!==lc(PNC_CONFIG.contracts.feeWallet)){alert(t('marketTx.feeWalletOnly'));return;}
  if(n.originRegistered){alert(t('marketTx.creatorAlreadyRegistered'));return;}
  if(!n.creator){alert(t('marketTx.creatorUnknown'));return;}
  if(!confirm(t('marketTx.registerLegacyConfirm')))return;
  try{
    const txHash=await sendTx({from:PNC_STATE.wallet,to:PNC_CONFIG.contracts.marketplace,data:encodeRegisterNFTOriginCall(n.contractAddress,n.tokenId,n.creator,true)});

    await refreshPlatform();
    alert(t('marketTx.creatorRegistered'));
  }catch(e){
    console.warn(e);
    alert(t('marketTx.transactionFailed')+'\n'+(e.message||e));
  }
}
async function handleEnableOffers(id){
  if(!requireWallet())return;
  const n=PNC_STATE.nfts.find(x=>x.id===id);
  if(!n||!n.tokenId)return;
  if(lc(n.owner)!==lc(PNC_STATE.wallet)){alert(t('marketTx.ownerOnlyEnableOffers'));return;}
  if(lc(n.owner)!==lc(n.creator)){alert(t('marketTx.creatorMintOnlyEnableOffers'));return;}
  if(n.originRegistered){alert(t('marketTx.offersAlreadyEnabled'));return;}
  if(!confirm(t('marketTx.enableOffersConfirm')))return;
  try{
    const txHash=await sendTx({from:PNC_STATE.wallet,to:PNC_CONFIG.contracts.marketplace,data:encodeRegisterNFTOriginByOwnerCall(n.contractAddress,n.tokenId)});
    assertSuccessfulReceipt(await waitForReceipt(txHash),'Offer enable transaction');
    await refreshPlatform();
    const refreshed=PNC_STATE.nfts.find(x=>nftKey(x)===nftKey(n));
    if(!refreshed||!refreshed.originRegistered)throw new Error(t('marketTx.offerEnableVerifyFailed'));
    alert(t('marketTx.offersAlreadyEnabled'));
  }catch(e){
    console.warn(e);
    alert(t('marketTx.transactionFailed')+'\n'+(e.message||e));
  }
}
async function handleCreateOffer(id){
  if(!requireWallet())return;
  const n=PNC_STATE.nfts.find(x=>x.id===id);
  if(!n||!n.tokenId)return;
  if(!n.originRegistered){alert(t('marketTx.offersNotEnabled'));return;}
  if(lc(n.owner)===lc(PNC_STATE.wallet)){alert(t('marketTx.ownerCannotOffer'));return;}
  const amount=prompt(t('marketTx.offerAmountPrompt',{currency:currencyUnit()}),'0.002');
  if(amount===null)return;
  const days=prompt(t('marketTx.offerDaysPrompt'),'7');
  if(days===null)return;
  let amountWei,expiresAt;
  try{
    amountWei=ethToWei(amount);
    if(BigInt(amountWei)<BigInt(PNC_STATE.market.minimumNativeWei||'0'))throw new Error(t('marketTx.offerBelowMinimum'));
    const dayCount=Number(days);
    if(!Number.isFinite(dayCount)||dayCount<=0||dayCount>365)throw new Error(t('marketTx.offerDaysRange'));
    expiresAt=Math.floor(Date.now()/1000)+Math.floor(dayCount*86400);
  }catch(e){alert(e.message||e);return;}
  if(!confirm(t('marketTx.offerConfirm',{amount,currency:currencyUnit()})))return;
  try{
    const txHash=await sendTx({from:PNC_STATE.wallet,to:PNC_CONFIG.contracts.marketplace,data:encodeCreateOfferCall(n.contractAddress,n.tokenId,expiresAt),value:weiToTxValue(amountWei)});
    assertSuccessfulReceipt(await waitForReceipt(txHash),'Create offer transaction');
    await refreshPlatform();
    const refreshed=PNC_STATE.nfts.find(x=>nftKey(x)===nftKey(n));
    if(!refreshed||!refreshed.offers.some(o=>lc(o.buyer)===lc(PNC_STATE.wallet)&&o.amountWei===amountWei))throw new Error(t('marketTx.offerCreateVerifyFailed'));
    alert(t('marketTx.offerCreated'));
  }catch(e){
    console.warn(e);
    alert(t('marketTx.transactionFailed')+'\n'+(e.message||e));
  }
}

    alert(t('marketTx.offerCancelled'));

    console.warn(e);

  }
}
async function handleAcceptOffer(id,offerId){
  if(!requireWallet())return;
  const n=PNC_STATE.nfts.find(x=>x.id===id);
  const offer=n&&Array.isArray(n.offers)?n.offers.find(x=>String(x.offerId)===String(offerId)):null;
  if(!n||!offer)return;
  if(lc(n.owner)!==lc(PNC_STATE.wallet)){alert(t('marketTx.ownerOnlyAcceptOffer'));return;}
  if(offer.expired){alert(t('marketTx.expiredOffer'));return;}
  if(!confirm(t('marketTx.acceptOfferConfirm',{amount:offer.amountEth,currency:currencyUnit()})))return;
  try{
    await ensureMarketplaceApproval(n);
    const txHash=await sendTx({from:PNC_STATE.wallet,to:PNC_CONFIG.contracts.marketplace,data:encodeAcceptOfferCall(offerId)});
    assertSuccessfulReceipt(await waitForReceipt(txHash),'Accept offer transaction');

async function handleCreateAuction(id){
  if(!requireWallet())return;
  const n=PNC_STATE.nfts.find(x=>x.id===id);
  if(!n||!n.tokenId)return;
  if(n.auction&&n.auction.active){alert(t('marketTx.activeAuctionExists'));return;}
  if(lc(n.owner)!==lc(PNC_STATE.wallet)){alert(t('marketTx.ownerOnlyAuction'));return;}
  if(Array.isArray(n.offers)&&n.offers.length){alert(t('marketTx.cancelOffersBeforeAuction'));return;}

  const minimum=auctionMinimumEth();
  const reserve=prompt(t('marketTx.reservePrompt',{currency:currencyUnit(),minimum}),minimum||'0.001');
  if(reserve===null)return;

  const buyNowInput=prompt(t('marketTx.buyNowPrompt',{currency:currencyUnit()}),'');
  if(buyNowInput===null)return;

  const defaultStart=formatAuctionInputDate(new Date(Date.now()+10*60*1000));
  const startInput=prompt(t('marketTx.auctionStartPrompt'),defaultStart);
  if(startInput===null)return;

  const daysInput=prompt(t('marketTx.auctionDaysPrompt'),'3');
  if(daysInput===null)return;

  let reserveWei,buyNowWei='0',startAt,durationDays,endsAt;
  try{
    reserveWei=ethToWei(reserve);
    if(BigInt(reserveWei)<BigInt(PNC_STATE.market.minimumNativeWei||'0'))throw new Error(t('marketTx.reserveBelowMinimum'));
    if(String(buyNowInput).trim()!==''){
      buyNowWei=ethToWei(buyNowInput);
      if(BigInt(buyNowWei)<BigInt(PNC_STATE.market.minimumNativeWei||'0'))throw new Error(t('marketTx.buyNowBelowMinimum'));
      if(BigInt(buyNowWei)<=BigInt(reserveWei))throw new Error(t('marketTx.buyNowMustExceedReserve'));
    }
    startAt=parseAuctionStart(startInput);
    const now=Math.floor(Date.now()/1000);
    if(startAt<now+60)throw new Error(t('marketTx.auctionStartTooSoon'));
    durationDays=Number(daysInput);
    if(!Number.isInteger(durationDays)||durationDays<1||durationDays>30)throw new Error(t('marketTx.auctionDurationDays'));
    endsAt=startAt+durationDays*86400;
  }catch(e){alert(e.message||e);return;}

  const buyNowLabel=BigInt(buyNowWei)>0n?buyNowInput+' '+currencyUnit():'Not set';
  if(!confirm(t('marketTx.auctionConfirm',{reserve,currency:currencyUnit(),buyNow:buyNowLabel,starts:formatAuctionTime(startAt),days:durationDays,ends:formatAuctionTime(endsAt)})))return;

  try{
    await ensureMarketplaceApproval(n);
    const txHash=await sendTx({
      from:PNC_STATE.wallet,
      to:PNC_CONFIG.contracts.marketplace,
      data:encodeCreateAuctionCall(n.contractAddress,n.tokenId,reserveWei,buyNowWei,startAt,durationDays)
    });
    assertSuccessfulReceipt(await waitForReceipt(txHash),'Create auction transaction');
    await refreshPlatform();
    const refreshed=PNC_STATE.nfts.find(x=>nftKey(x)===nftKey(n));
    if(!refreshed||!refreshed.auction||!refreshed.auction.active)throw new Error(t('marketTx.auctionCreateVerifyFailed'));
    alert(t('marketTx.auctionCreated'));
  }catch(e){
    console.warn(e);
    alert(t('marketTx.transactionFailed')+'\n'+(e.message||e));
  }
}

  if(lc(n.owner)!==lc(PNC_STATE.wallet)){alert(t('marketTx.ownerOnlyUnlist'));return;}
  if(!confirm(t('marketTx.unlistConfirm')))return;

  const walletAtSubmit=PNC_STATE.wallet;
  const nftKeyAtSubmit=nftKey(n);
  try{
    const txHash=await sendTx({
      from:walletAtSubmit,
      to:PNC_CONFIG.contracts.marketplace,
      data:encodeCancelListingCall(n.listingId)
    });
    const receipt=await waitForReceipt(txHash);
    assertSuccessfulReceipt(receipt,'Unlist transaction');

    const current=PNC_STATE.nfts.find(x=>nftKey(x)===nftKeyAtSubmit);
    if(current){
      applyMarketplaceStateToNFT(PNC_STATE,current,{status:'not_for_sale'});
      renderAll(PNC_STATE);
      closeNftDetail();
    }
    alert(t('marketTx.unlistComplete'));

    let confirmed=false;
    for(const delayMs of [1200,2200,3500]){
      await new Promise(resolve=>setTimeout(resolve,delayMs));
      try{
        const result=await readMarketplaceStateForNFT(PNC_CONFIG.contracts.nft,n.tokenId);
        if(result.status==='not_for_sale'){
          confirmed=true;
          break;
        }
      }catch(e){
        console.warn('Unlist confirmation retry failed:',e);
      }
    }
    if(confirmed&&lc(PNC_STATE.wallet)===lc(walletAtSubmit)){
      await refreshPlatform();
    }else if(!confirmed){
      console.warn('Unlist is confirmed by its successful receipt. Marketplace readback is delayed; no second transaction is required.');
    }
  }catch(e){
    console.warn(e);
    alert(t('marketTx.transactionFailed')+'\n'+(e.message||e));
  }
}

const PNC_CAROUSEL_IDS=['hotNfts','liveAuctions','newNfts','newCollections','featuredCollections'];
const PNC_AUTO_CAROUSEL_ID='newNfts';
const PNC_AUTO_SCROLL_SPEED_PX_PER_MS=0.028;
const PNC_AUTO_RESUME_DELAY_MS=1200;

function carouselStep(track){return Math.max(160,Math.round(track.clientWidth*.62));}
function isInfiniteCarousel(track){return !!track&&track.id===PNC_AUTO_CAROUSEL_ID&&Number(track.dataset.carouselSetWidth||0)>0;}
function updateCarouselControls(track){
  const prev=document.querySelector(`[data-carousel-prev="${track.id}"]`);
  const next=document.querySelector(`[data-carousel-next="${track.id}"]`);
  const overflow=track.scrollWidth>track.clientWidth+4;
  if(prev)prev.disabled=!overflow;
  if(next)next.disabled=!overflow;
}
function cancelCarouselAnimation(track){
  if(!track)return;
  if(track._carouselAnimationFrame)cancelAnimationFrame(track._carouselAnimationFrame);
  track._carouselAnimationFrame=0;
  track.classList.remove('is-animating');
}
function clearCarouselResumeTimer(track){
  if(!track||!track._carouselResumeTimer)return;
  clearTimeout(track._carouselResumeTimer);
  track._carouselResumeTimer=0;
}
function setAutoCarouselPaused(track,paused){
  if(!track||track.id!==PNC_AUTO_CAROUSEL_ID)return;
  track.dataset.carouselPaused=paused?'1':'0';
  track.classList.toggle('is-auto-scrolling',!paused&&!document.hidden);
  if(!paused)track._carouselPosition=track.scrollLeft;
}
function pauseCarouselAuto(track){
  if(!track||track.id!==PNC_AUTO_CAROUSEL_ID)return;
  clearCarouselResumeTimer(track);
  setAutoCarouselPaused(track,true);
}
function resumeCarouselAuto(track,delay=PNC_AUTO_RESUME_DELAY_MS){
  if(!track||track.id!==PNC_AUTO_CAROUSEL_ID)return;
  clearCarouselResumeTimer(track);
  track._carouselResumeTimer=setTimeout(()=>{
    track._carouselResumeTimer=0;
    normalizeInfiniteCarousel(track);
    setAutoCarouselPaused(track,false);
    startCarouselAuto(track);
  },Math.max(0,delay));
}
function stopCarouselAuto(track){
  if(!track)return;

function normalizeInfiniteCarousel(track){

function prepareInfiniteCarousel(track){
  if(!track||track.id!==PNC_AUTO_CAROUSEL_ID)return;
  stopCarouselAuto(track);
  track.querySelectorAll('[data-carousel-clone="1"]').forEach(node=>node.remove());
  delete track.dataset.carouselSetWidth;
  const originals=Array.from(track.children);
  if(originals.length<2){
    track.scrollLeft=0;
    track._carouselPosition=0;
    updateCarouselControls(track);
    return;
  }
  const originalWidth=track.scrollWidth;
  if(originalWidth<=track.clientWidth+4){

    updateCarouselControls(track);

  }

    if(setWidth<=0)return;
    track.dataset.carouselSetWidth=String(setWidth);
    track.scrollLeft=middleFirst.offsetLeft;

function startCarouselAuto(track){

function animateCarouselTo(track,target,duration=720){

  const ease=t=>1-Math.pow(1-t,3);

    const progress=Math.min(1,(now-started)/duration);
    track.scrollLeft=from+(distance*ease(progress));

    if(progress<1)track._carouselAnimationFrame=requestAnimationFrame(frame);
    else{
      track._carouselAnimationFrame=0;

function applyDesktopMomentum(track,velocity){

function bindCarousel(track){

async function handleVaultSend(form){
  if(!requireWallet())return;
  const fd=new FormData(form),id=String(fd.get('nftId')||''),to=String(fd.get('toAddress')||'').trim();
  const n=vaultSendableNFTs(PNC_STATE).find(x=>x.id===id);
  if(!n){alert(t('vaultTx.nftUnavailable'));return;}
  if(!/^0x[a-fA-F0-9]{40}$/.test(to)){alert(t('vaultTx.invalidAddress'));return;}
  if(lc(to)===lc(PNC_STATE.wallet)){alert(t('vaultTx.sameAddress'));return;}
  if(lc(to)==='0x0000000000000000000000000000000000000000'){alert(t('vaultTx.zeroAddress'));return;}
  if(n.status==='listed'||(n.auction&&n.auction.active)){alert(t('vaultTx.removeFromMarketFirst'));return;}
  if(!confirm(t('vaultTx.sendConfirm',{name:n.name,tokenId:n.tokenId,to})))return;
  try{
    const ownerBefore=await readOwnerOf(n.tokenId);
    if(lc(ownerBefore)!==lc(PNC_STATE.wallet))throw new Error(t('marketTx.walletNoLongerOwner'));
    const txHash=await sendTx({from:PNC_STATE.wallet,to:n.contractAddress,data:encodeSafeTransferFromCall(PNC_STATE.wallet,to,n.tokenId)});
    assertSuccessfulReceipt(await waitForReceipt(txHash),'NFT transfer transaction');
    const ownerAfter=await readOwnerOfWithRetry(n.tokenId,to);
    if(lc(ownerAfter)!==lc(to))throw new Error(t('marketTx.newOwnerVerifyFailed'));
    await refreshPlatform();
    PNC_VAULT_TAB='owned';
    renderVault(PNC_STATE);
    alert(t('vaultTx.sendComplete',{owner:to}));
  }catch(e){
    console.warn(e);
    alert(t('vaultTx.sendFailed')+'\n'+(e.message||e));
  }
}

function clearSearchUI(){const input=$('searchInput'),box=$('searchResults');if(input){input.value='';input.blur();}if(box){box.classList.remove('show');box.innerHTML='';}}function selectSearchCollection(collectionId){clearSearchUI();openCollection(collectionId);}function selectSearchNFT(id){clearSearchUI();showDetailById(id);}function openCollection(collectionId){renderCollectionPage(PNC_STATE,collectionId);showPage('collectionPage');}function showDetailById(id){const n=PNC_STATE.nfts.find(x=>x.id===id);if(!n)return;const c=PNC_STATE.collections.find(x=>x.id===n.collectionId)||{};const desc=n.description||(n.metadata&&n.metadata.description)||'';$('nftDetailBox').innerHTML=`<div class="detail-toolbar"><button class="detail-close" onclick="closeNftDetail()">×</button></div><div class="detail-head">${renderNFTMedia(n,'detail')}<div class="detail-summary"><div class="detail-title">${esc(n.name)}</div><div class="meta">${esc(c.name||n.collectionName||'-')} ${c.verified?'<span class="badge">✔</span>':''}</div>${priceLine(n)}${shopSocialHtml(c)}<div class="badge-row"><span class="badge ${statusClass(n)}">${esc(statusLabel(n))}</span><span class="chain-badge">${esc(chainLabel(n))}</span></div></div></div>${desc?`<div class="detail-section"><div class="detail-section-title">${esc(t('detail.description'))}</div><div class="meta">${esc(desc)}</div></div>`:''}<div class="detail-section"><div class="detail-section-title">${esc(t('detail.information'))}</div><div class="detail-info-grid"><div>${infoRow(t('detail.nftId'),n.id)}${infoRow(t('detail.mediaType'),resolveNFTMedia(n).mediaType==='video'?t('detail.videoNft'):t('detail.imageNft'))}${infoRow(t('common.tokenId'),n.tokenId||'-')}${infoRow(t('detail.collection'),c.name||n.collectionName||'-')}${infoRow(t('common.contract'),displayAddress(n.contractAddress))}</div><div>${infoRow(t('common.owner'),displayAddress(n.owner))}${infoRow(t('common.creator'),displayAddress(n.creator))}${infoRow(t('detail.primarySale'),n.primarySaleCompleted?t('detail.completed'):t('detail.notCompleted'))}${infoRow(t('detail.seller'),displayAddress(n.seller))}${infoRow(t('detail.listingId'),n.listingId||'-')}${infoRow(t('detail.activeOffers'),(n.offers||[]).length)}${n.auction?infoRow(t('marketUi.auctionId'),n.auction.auctionId):''}${n.auction?infoRow(t('detail.auctionSeller'),displayAddress(n.auction.seller)):''}</div></div></div><div class="detail-section"><div class="detail-section-title">${esc(t('common.offers'))}</div>${offerListHtml(n)}</div><div class="detail-section"><div class="detail-section-title">${esc(t('common.auction'))}</div>${auctionListHtml(n)}</div>${bidRefundHtml()}${detailActionButtons(n)}`;const modal=$('nftDetailOverlay');prepareModalOpen(modal);modal.classList.add('show');}function closeNftDetail(ev){if(ev&&ev.target&&ev.target.id!=='nftDetailOverlay')return;closeModalElement($('nftDetailOverlay'));}function searchPNC(){const q=lc($('searchInput').value).trim(),box=$('searchResults');if(!q){box.classList.remove('show');box.innerHTML='';return;}const cs=PNC_STATE.collections.filter(c=>lc(c.name).includes(q));const ns=PNC_STATE.nfts.filter(n=>lc(n.name).includes(q));box.innerHTML=cs.map(c=>`<div class="search-item" onclick="selectSearchCollection('${esc(c.id)}')">🏪 ${esc(c.name)}<div class="meta">${esc(t('search.collection'))}</div></div>`).join('')+ns.map(n=>`<div class="search-item" onclick="selectSearchNFT('${esc(n.id)}')">🖼 ${esc(n.name)}<div class="meta">NFT</div></div>`).join('');box.classList.toggle('show',!!box.innerHTML);}
document.addEventListener('keydown',event=>{if(event.key==='Escape'){closeLegal();closeNftDetail();closeWalletModal();}});
document.addEventListener('DOMContentLoaded',async()=>{
  try{
    initLanguageEngine();
    applyPNCBrandIcon();
    installWalletListeners();
    await refreshPlatform();
  }catch(e){
    setRefreshButtonState('error');
  }
});
</script>
